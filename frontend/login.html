<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="/NextTrack/frontend/styles/login.css" />
  </head>
  <body>
    <a href="/NextTrack/frontend/pages/index.html" class="button-class">Back</a>
    <div id="logoContainer">
      <div id="logoBox">
        <p>Login</p>
      </div>
    </div>
    <form action="/NextTrack/frontend/pages/session.html">
      <div id="loginForm">
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Username"
        /><br /><br />
        <input
          type="text"
          id="password"
          name="password"
          placeholder="Password"
        /><br /><br />
        <button type="submit" class="button-class">Login</button>
      </div>
    </form>
  </body>
</html>
