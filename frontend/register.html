<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="login.css" />
    <title>Register</title>
    <script src="js/register.js" defer></script>
    <link rel="icon" type="image/x-icon" href="/NextTrack/images/favicon.ico" />
  </head>
  <body>
    <a href="index.html" class="button-class">&#8592;</a>
    <div id="logoContainer">
      <div id="logoBox">
        <p>Register</p>
      </div>
    </div>
    <form action="session.html" id="form">
      <div id="loginForm">
        <div class="input-row">
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Username"
            autocomplete="off"
            required
          />
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Password"
            autocomplete="off"
            required
          />
        </div>
        <div class="input-row">
          <input
            type="text"
            id="email"
            name="email"
            placeholder="Email"
            autocomplete="off"
            required
          />
          <div id="countrySelect">
            <select id="countrySelect1" required>
              <option value="" disabled selected>Select country</option>
              <option value="DA">Denmark</option>
              <option value="DE">Germany</option>
            </select>
          </div>
        </div>
        <div class="input-row">
          <input
            type="text"
            id="age"
            name="DoB"
            placeholder="Age"
            autocomplete="off"
            required
          />
          <div id="genderSelect">
            <select id="genderSelect1" required>
              <option value="" disabled selected>Select gender</option>
              <option value="M">Male</option>
              <option value="F">Female</option>
              <option value="NO">Other</option>
            </select>
          </div>
        </div>
        <div id="registerRow">
          <label id="tncLabel">
            <input type="checkbox" id="tnc" name="tnc" required />
            T&amp;C's
          </label>
          <button type="submit" class="button-class" id="submit">Submit</button>
        </div>
      </div>
    </form>
  </body>
</html>
