<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="/NextTrack/frontend/styles/login.css" />
    <title>Document</title>
  </head>
  <body>
    <a href="index.html" class="button-class">Back</a>
    <div id="logoContainer">
      <div id="logoBox">
        <p>Register</p>
      </div>
    </div>
    <form action="/session.html">
      <div id="loginForm">
        <div class="input-row">
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Username"
          />
          <input
            type="text"
            id="password"
            name="password"
            placeholder="Password"
          />
        </div>
        <div class="input-row">
          <input type="text" id="email" name="email" placeholder="Email" />
          <input
            type="text"
            id="country"
            name="country"
            placeholder="Country"
          />
        </div>
        <div class="input-row">
          <input type="text" id="age" name="age" placeholder="Age" />
          <input type="text" id="gender" name="gender" placeholder="Gender" />
        </div>
        <div id="registerRow">
          <label id="tncLabel">
            <input type="checkbox" id="tnc" name="tnc" required />
            T&amp;C's
          </label>
          <button type="submit" class="button-class">Register</button>
        </div>
      </div>
    </form>
  </body>
</html>
